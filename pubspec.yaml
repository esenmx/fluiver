name: fluiver
description: Flutter SDK gap-fillers — scope function, DateTime predicates, observers, FlexGrid, debounce/throttle. Ships an LLM skill for agent-friendly coding.
version: 3.3.0
homepage: https://mehmetesen.com
repository: https://github.com/esenmx/fluiver
issue_tracker: https://github.com/esenmx/fluiver/issues

topics:
  - utilities
  - extensions
  - widgets
  - flutter
  - llm

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.17.0

dev_dependencies:
  build_runner: ^2.15.0
  checks: ^0.3.1
  fake_async: ^1.3.3
  flutter_test:
    sdk: flutter
  mockito: ^5.6.4
  very_good_analysis: ^10.2.0
