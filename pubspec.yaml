name: fluiver
description: Flutter utility library — debounce/throttle, observers, FlexGrid, DateTime predicates, and SDK gap-fillers.
version: 3.1.0
homepage: https://mehmetesen.com
repository: https://github.com/esenmx/fluiver
issue_tracker: https://github.com/esenmx/fluiver/issues

topics:
  - utilities
  - helpers
  - widgets
  - debounce
  - throttle

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.17.0

dev_dependencies:
  build_runner: ^2.10.4
  checks: ^0.3.1
  fake_async: ^1.3.3
  flutter_test:
    sdk: flutter
  mockito: ^5.6.1
  very_good_analysis: ^10.0.0
