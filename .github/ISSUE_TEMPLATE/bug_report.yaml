name: Bug report
description: Something is broken in fluiver
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: |
        I called `Map.entryOf('k')` on a map with a null value and got null instead of `MapEntry('k', null)`.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A minimal Dart snippet that reproduces the issue.
      render: dart
      placeholder: |
        final m = <String, int?>{'a': null};
        print(m.entryOf('a')); // expected MapEntry('a', null), got null
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: fluiver version
      placeholder: 3.0.0
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Output of `flutter doctor -v`.
      render: shell
    validations:
      required: true
